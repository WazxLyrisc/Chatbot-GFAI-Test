<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lục Tư Hạ</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>
<body>

    <div class="chat-container">
        <div class="chat-header">
            <div class="user-info">
                <div class="avatar-container">
                    <img class="avatar" src="vương quốc an female v2.jpg" alt="AI Avatar">
                    <div class="status-dot"></div>
                </div>
                <div>
                    <div class="user-name">Lục Tư Hạ</div>
                    <div class="user-status">Đang hoạt động</div>
                </div>
            </div>
            <div class="header-actions">
                <i class="fa-solid fa-phone"></i>
                <i class="fa-solid fa-video"></i>
                <i class="fa-solid fa-circle-info"></i>
            </div>
        </div>

        <div class="chat-body" id="chatBody">
            <div class="message received">Chào anh, hôm nay của anh thế nào? 😊</div>
        </div>

        <div class="chat-footer">
            <div class="footer-actions">
                <i class="fa-solid fa-circle-plus"></i>
                <i class="fa-solid fa-image"></i>
                <i class="fa-solid fa-microphone"></i>
            </div>
            <div class="input-container">
                <input type="text" class="chat-input" id="chatInput" placeholder="Aa">
                <i class="fa-regular fa-face-smile emoji-btn"></i>
            </div>
            <button class="send-btn" id="sendBtn">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <script src="script.js">
    </script>
</body>
</html>
